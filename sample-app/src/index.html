<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Practice — Todo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>📝 Todo リスト</h1>
    <p class="subtitle">Cursor 実践演習用サンプルアプリ</p>

    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="新しいタスクを入力..." autocomplete="off">
      <button type="submit">追加</button>
    </form>

    <ul id="todo-list"></ul>

    <footer>
      <span id="todo-count">0 件</span>
      <button id="clear-completed" type="button">完了済みを削除</button>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
